<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>我らのドラフト会議</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --primary: #3b82f6; --primary-hover: #2563eb; --accent: #f43f5e; --success: #10b981; --gray: #64748b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        h1 { color: #fff; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); font-size: 2.5em; margin-bottom: 30px;}
        .screen { display: none; background: var(--panel); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 700px; margin: 0 auto; border: 1px solid #334155; position: relative; }
        .active-screen { display: block; }
        input[type="text"], select { padding: 12px; font-size: 1.2em; width: 80%; margin: 10px 0; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: white; }
        button { padding: 15px 30px; font-size: 1.1em; margin: 10px; cursor: pointer; border: none; border-radius: 6px; background-color: var(--primary); color: white; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background-color: #475569; cursor: not-allowed; color: #94a3b8; transform: none; box-shadow: none; }
        .btn-back { background-color: transparent; border: 1px solid var(--gray); color: var(--gray); padding: 10px 20px; font-size: 0.9em; box-shadow: none;}
        
        #timerDisplay { font-size: 5em; color: var(--accent); font-weight: bold; text-shadow: 0 0 15px rgba(244, 63, 94, 0.5); }
        #whiteboard { border: 3px solid #cbd5e1; background-color: white; border-radius: 8px; cursor: crosshair; touch-action: none; margin: 15px auto; display: block; max-width: 100%; }
        
        .status-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; background-color: var(--gray); display: inline-block; margin-right: 5px; vertical-align: middle; }
        .status-dot.done { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-item { background: #0f172a; padding: 8px 15px; border-radius: 20px; font-size: 0.9em; border: 1px solid #334155;}

        .judge-item { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155;}
        .judge-item img { background: white; border-radius: 4px; max-width: 150px; border: 1px solid #ccc; }
        .judge-item input { width: 50%; margin-left: 10px; border: 2px solid var(--gray); }
        .judge-item input.error { border-color: var(--accent); background-color: rgba(244, 63, 94, 0.1); }

        #reveal-container { min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .reveal-title { font-size: 1.5em; color: var(--gray); margin-bottom: 20px; }
        .reveal-name { font-size: 3em; color: #fff; font-weight: bold; text-shadow: 0 0 15px var(--primary); margin-bottom: 20px; }
        .reveal-conflict { font-size: 3em; color: var(--accent); font-weight: bold; text-shadow: 0 0 20px var(--accent); animation: flash 0.5s infinite alternate; }
        .reveal-image { background: white; padding: 10px; border-radius: 8px; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; margin-bottom: 10px;}
        .reveal-pick-text { font-size: 2.5em; color: var(--success); font-weight: bold; display: none; }
        .roulette-box { background: #0f172a; border: 2px solid var(--primary); padding: 20px; border-radius: 12px; font-size: 2em; margin: 20px 0; width: 80%; display: none; }
        
        @keyframes flash { from { opacity: 0.5; } to { opacity: 1; } }

        .result-item { margin: 10px 0; padding: 15px; border-radius: 8px; border-left: 5px solid #475569; text-align: left; background: #0f172a; }
        .result-success { border-left-color: var(--success); }
        .result-lost { border-left-color: var(--accent); opacity: 0.8; }
        .host-only { display: none; background-color: rgba(245, 158, 11, 0.1); padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid rgba(245, 158, 11, 0.3); }
        .summary-container { display: flex; text-align: left; margin-top: 20px; border: 1px solid #334155; height: 400px; border-radius: 8px; overflow: hidden; }
        .summary-names { width: 30%; border-right: 1px solid #334155; overflow-y: auto; background: #0f172a; }
        .summary-names div { padding: 15px; cursor: pointer; border-bottom: 1px solid #1e293b; }
        .summary-details { width: 70%; padding: 20px; overflow-y: auto; background: var(--panel); }
        .history-item { margin-bottom: 10px; padding: 12px; background: #0f172a; border-radius: 6px; border-left: 4px solid var(--primary); }

        /* おぉ〜ボタン */
        #btn-ooh { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; border-radius: 50%; background-color: #f59e0b; color: #fff; font-size: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; display: none; cursor: pointer; border: 2px solid #fbbf24; }
        #btn-ooh:active { transform: scale(0.9); }
        #btn-ooh:disabled { background-color: #64748b; border-color: #475569; transform: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>我らのドラフト会議</h1>

    <button id="btn-ooh">おぉ〜</button>

    <div id="step-password" class="screen active-screen">
        <h2 style="color: var(--success);">ドラフト会場に入室</h2>
        <input type="text" id="input-password" placeholder="部屋の合言葉を入力"><br>
        <button id="btn-submit-pass" style="background-color: var(--success);">入室する</button>
        <p id="pass-error" style="color: var(--accent); font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div id="step-name" class="screen">
        <h2>監督名を決定</h2>
        <input type="text" id="input-name" placeholder="チーム名・監督名"><br>
        <button id="btn-submit-name">決定して待機室へ</button>
        <p id="name-error" style="color: var(--accent); font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div id="step-waiting" class="screen">
        <h2 id="role-msg">参加者を待機中...</h2>
        <div id="host-settings" class="host-only">
            <h3 style="color:#fbbf24;">★司会者メニュー</h3>
            <input type="text" id="input-theme" placeholder="テーマ (例: 最強の構成)">
            <p>巡数: <select id="select-rounds"><option value="1">1</option><option value="3">3</option><option value="6">6</option></select></p>
            <button id="btn-start-meeting" disabled>会議を開始する</button>
        </div>
        <ul id="players-list" style="list-style:none; padding:0; font-size: 1.2em;"></ul>
    </div>

    <div id="step-drafting" class="screen">
        <h2 id="display-theme" style="color: var(--primary);"></h2>
        <div id="host-round-controls" class="host-only">
            <button id="btn-start-round" style="background-color: #fbbf24; color: #000;"><span id="round-num-text">1</span>巡目指名を開始 (60秒)</button>
        </div>
        
        <div id="timerDisplay" style="display:none">60</div>
        
        <div id="pick-area" style="display:none">
            <canvas id="whiteboard" width="500" height="200"></canvas><br>
            <button id="btn-clear-canvas" style="background-color: var(--gray); padding: 10px 20px;">書き直す</button>
            <button id="btn-submit-early" style="background-color: var(--success);">決定（提出する）</button>
        </div>
        
        <h3 id="wait-pick-msg" style="display:none; color:var(--success)">提出完了。他の監督を待っています...</h3>

        <div id="host-status-area" class="host-only" style="display:none;">
            <h3>参加者の提出状況</h3>
            <div id="status-container" class="status-list"></div>
            <button id="btn-force-judgment" style="background-color: var(--accent); margin-top: 15px;">強制的に公開へ進む</button>
        </div>
    </div>

    <div id="step-reveal" class="screen">
        <div id="reveal-container">
            <div id="rev-title" class="reveal-title"></div>
            <div id="rev-name" class="reveal-name"></div>
            <img id="rev-image" class="reveal-image" src="">
            <div id="rev-pick-text" class="reveal-pick-text"></div>
            <div id="rev-roulette" class="roulette-box"></div>
        </div>
    </div>

    <div id="step-judging" class="screen">
        <div id="host-judge-area" class="host-only" style="display:none;">
            <h2 style="color:#fbbf24;">★司会者判定フェーズ</h2>
            <p style="font-size:0.9em; color:var(--gray);">読み取った文字をテキスト化してください。</p>
            <div id="judge-list"></div>
            <button id="btn-submit-judgment" style="background-color: var(--accent); margin-top: 20px;">判定確定・競合チェックへ！</button>
        </div>
        
        <div id="participant-wait-area" style="display:none;">
            <h2 style="color:var(--success);">ホワイトボード公開終了！</h2>
            <p>司会者がドラフトの判定（被りチェック）を行っています。<br>結果発表までしばらくお待ちください...</p>
        </div>
    </div>

    <div id="step-result" class="screen">
        <h2><span id="result-round-num">1</span>巡目 結果一覧</h2>
        <ul id="result-list" style="list-style:none; padding:0"></ul>
        <div id="host-next-controls" class="host-only">
            <button id="btn-re-nominate" style="background-color:var(--accent); display:none;">外れ再指名を開始 (30秒)</button>
            <button id="btn-next-round" style="display:none;">次の巡へ進む</button>
            <button id="btn-show-final" style="display:none; background-color:var(--success);">最終結果を見る</button>
        </div>
    </div>

    <div id="step-final" class="screen">
        <h2>ドラフト最終結果</h2>
        <div class="summary-container">
            <div id="final-names" class="summary-names"></div>
            <div id="final-details" class="summary-details"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isHost = false, currentRound = 1, maxRounds = 1, myName = "", myRoomId = "", isMyTurn = true;
        let timerInterval;

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // --- 音声関連（Web Audio API） ---
        let audioCtx;
        function initAudio() { try { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); } catch(e) {} }
        
        function playTone(freq, type, duration, vol=0.1) {
            if(!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        
        function sndTaiko() {
            if(!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15); 
                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); 
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        function sndConflict() { playTone(800, 'sine', 0.1, 0.1); setTimeout(() => playTone(800, 'sine', 0.1, 0.1), 150); }
        function sndTick() { playTone(1000, 'triangle', 0.05, 0.1); }
        function sndWin() { playTone(523.25, 'sine', 0.1); setTimeout(()=>playTone(659.25, 'sine', 0.1), 100); setTimeout(()=>playTone(783.99, 'sine', 0.4), 200); }

        // --- おぉ〜ボタンの実装 ---
        const btnOoh = document.getElementById('btn-ooh');
        btnOoh.addEventListener('click', function() {
            if (!myRoomId) return;
            socket.emit('sendOoh', myRoomId);
            
            btnOoh.disabled = true;
            let countdown = 10;
            btnOoh.innerText = countdown;
            
            const cdInterval = setInterval(() => {
                countdown--;
                btnOoh.innerText = countdown;
                if (countdown <= 0) {
                    clearInterval(cdInterval);
                    btnOoh.disabled = false;
                    btnOoh.innerText = "おぉ〜";
                }
            }, 1000);
        });

        socket.on('playOohSound', () => {
            // publicフォルダに ooh.mp3 がある場合はこちらを鳴らす（無い場合はエラー無視）
            const audio = new Audio('/public/ooh.mp3');
            audio.play().catch(e => {
                // MP3が無い/ブロックされた場合は、代わりに「歓声風」の電子音を鳴らす
                if(audioCtx) {
                    playTone(400, 'sine', 0.5, 0.05); playTone(500, 'sine', 0.5, 0.05); playTone(600, 'sine', 0.5, 0.05);
                }
            });
        });

        // --- キャンバス処理 ---
        const canvas = document.getElementById('whiteboard'); const ctx = canvas.getContext('2d'); let isDrawing = false;
        ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        function startPosition(e) { isDrawing = true; draw(e); } function endPosition() { isDrawing = false; ctx.beginPath(); }
        function draw(e) { if (!isDrawing) return; const rect = canvas.getBoundingClientRect(); const x = (e.clientX || e.touches[0].clientX) - rect.left; const y = (e.clientY || e.touches[0].clientY) - rect.top; ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y); }
        canvas.addEventListener('mousedown', startPosition); canvas.addEventListener('mouseup', endPosition); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); }, {passive: false}); canvas.addEventListener('touchend', endPosition); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        document.getElementById('btn-clear-canvas').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        function getCanvasData() { return canvas.toDataURL('image/png'); }

        // --- ルーム処理 ---
        document.getElementById('btn-submit-pass').onclick = () => { initAudio(); myRoomId = document.getElementById('input-password').value.trim(); if(myRoomId) { document.getElementById('pass-error').innerText = ""; socket.emit('joinRoomRequest', myRoomId); } else { document.getElementById('pass-error').innerText = "合言葉を入力してください！"; } };
        socket.on('roomJoinedOk', () => { document.getElementById('pass-error').innerText = ""; showScreen('step-name'); });
        socket.on('roomError', m => { document.getElementById('pass-error').innerText = m; });
        
        document.getElementById('btn-submit-name').onclick = () => { 
            myName = document.getElementById('input-name').value.trim(); 
            if(myName) { 
                document.getElementById('name-error').innerText = ""; 
                socket.emit('join', myRoomId, myName); 
                showScreen('step-waiting'); 
                btnOoh.style.display = 'block'; // 待機画面からおぉ〜ボタン解禁
            } else { 
                document.getElementById('name-error').innerText = "チーム名・監督名を入力してください！"; 
            } 
        };

        socket.on('youAreHost', () => { isHost = true; document.querySelectorAll('.host-only').forEach(e => e.style.display = 'block'); document.getElementById('role-msg').innerHTML = "あなたは<span style='color:#fbbf24'>司会者(ホスト)</span>です！"; });
        socket.on('youAreNotHost', () => { isHost = false; document.querySelectorAll('.host-only').forEach(e => e.style.display = 'none'); });
        
        let currentPlayers = [];
        socket.on('updatePlayers', ps => { currentPlayers = ps; const l = document.getElementById('players-list'); l.innerHTML = ''; ps.forEach(p => { const li = document.createElement('li'); li.innerText = p.name; l.appendChild(li); }); });

        document.getElementById('input-theme').oninput = e => document.getElementById('btn-start-meeting').disabled = !e.target.value;
        document.getElementById('btn-start-meeting').onclick = () => { socket.emit('startMeeting', myRoomId, { theme: document.getElementById('input-theme').value, rounds: document.getElementById('select-rounds').value }); };
        socket.on('meetingStarted', d => { maxRounds = parseInt(d.rounds); document.getElementById('display-theme').innerText = "テーマ: " + d.theme; showScreen('step-drafting'); });

        document.getElementById('btn-start-round').onclick = () => socket.emit('startRound', myRoomId, currentRound, 60, false);
        document.getElementById('btn-re-nominate').onclick = () => socket.emit('startRound', myRoomId, currentRound, 30, true);

        // --- ドラフト入力フェーズ ---
        socket.on('startTimer', d => {
            showScreen('step-drafting'); document.getElementById('host-round-controls').style.display = 'none'; const t = document.getElementById('timerDisplay'); t.style.display = 'block';
            isMyTurn = !d.successMembers.includes(socket.id);
            if (isMyTurn) { document.getElementById('pick-area').style.display = 'block'; document.getElementById('wait-pick-msg').style.display = 'none'; ctx.clearRect(0, 0, canvas.width, canvas.height); } else { document.getElementById('pick-area').style.display = 'none'; document.getElementById('wait-pick-msg').innerText = "あなたは獲得済みです。待機中..."; document.getElementById('wait-pick-msg').style.display = 'block'; }
            if (isHost) { document.getElementById('host-status-area').style.display = 'block'; const sCont = document.getElementById('status-container'); sCont.innerHTML = ''; currentPlayers.forEach(p => { if(!d.successMembers.includes(p.id)) { sCont.innerHTML += `<div class="status-item" id="status-${p.id}"><span class="status-dot"></span>${p.name}</div>`; } }); }
            let left = d.seconds; t.innerText = left; if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => { left--; t.innerText = left; if(left <= 0) { clearInterval(timerInterval); t.style.display = 'none'; if (isMyTurn) forceSubmitPick(); } }, 1000);
        });

        document.getElementById('btn-submit-early').onclick = () => { forceSubmitPick(); };
        function forceSubmitPick() { if(!isMyTurn) return; isMyTurn = false; document.getElementById('pick-area').style.display = 'none'; document.getElementById('wait-pick-msg').innerText = "提出完了！全員の提出を待っています..."; document.getElementById('wait-pick-msg').style.display = 'block'; socket.emit('submitPickEarly', myRoomId, getCanvasData()); }
        socket.on('playerSubmitted', (playerId) => { if(!isHost) return; const item = document.getElementById(`status-${playerId}`); if(item) item.querySelector('.status-dot').classList.add('done'); });
        document.getElementById('btn-force-judgment').onclick = () => { clearInterval(timerInterval); document.getElementById('timerDisplay').style.display = 'none'; socket.emit('forceJudgment', myRoomId); };

        // --- 全員のホワイトボードを劇的に発表 ---
        socket.on('startWhiteboardReveal', async (picks) => {
            document.getElementById('host-status-area').style.display = 'none';
            showScreen('step-reveal');
            const title = document.getElementById('rev-title'); const nameEl = document.getElementById('rev-name'); 
            const imgEl = document.getElementById('rev-image'); const pickEl = document.getElementById('rev-pick-text');
            const rouletteEl = document.getElementById('rev-roulette');

            const kanjiNums = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
            const roundKanji = kanjiNums[currentRound] || currentRound;

            for (const p of picks) {
                imgEl.style.display = 'none'; pickEl.style.display = 'none'; rouletteEl.style.display = 'none';
                title.innerText = `第${roundKanji}回 選択希望選手`;
                nameEl.innerText = p.name + " 監督";
                nameEl.classList.remove('reveal-conflict');

                await sleep(4000); 
                sndTaiko();
                imgEl.src = p.image || ''; imgEl.style.display = 'block';
                await sleep(3500); 
            }

            if (isHost) {
                showScreen('step-judging');
                document.getElementById('host-judge-area').style.display = 'block';
                document.getElementById('participant-wait-area').style.display = 'none';
                const list = document.getElementById('judge-list'); list.innerHTML = '';
                picks.forEach(p => {
                    list.innerHTML += `
                        <div class="judge-item">
                            <div style="width: 25%; font-weight: bold;">${p.name} 監督</div>
                            <img src="${p.image || ''}" alt="未提出">
                            <input type="text" class="judge-input" data-id="${p.id}" placeholder="読み取った文字">
                        </div>
                    `;
                });
            } else {
                showScreen('step-judging');
                document.getElementById('host-judge-area').style.display = 'none';
                document.getElementById('participant-wait-area').style.display = 'block';
            }
        });

        document.getElementById('btn-submit-judgment').onclick = () => {
            const inputs = document.querySelectorAll('.judge-input'); let judgments = {}; let hasEmpty = false;
            inputs.forEach(inp => { inp.classList.remove('error'); const val = inp.value.trim(); if (!val) { hasEmpty = true; inp.classList.add('error'); } judgments[inp.dataset.id] = val; });
            if (hasEmpty) { alert('未入力の判定があります！すべてのホワイトボードの文字をテキスト化してください。'); return; }
            socket.emit('submitJudgment', myRoomId, judgments);
        };

        // --- 判定後、競合があればルーレット、なければ即一覧へ ---
        socket.on('showRoundResults', async (data) => {
            const title = document.getElementById('rev-title'); const nameEl = document.getElementById('rev-name'); 
            const imgEl = document.getElementById('rev-image'); const pickEl = document.getElementById('rev-pick-text');
            const rouletteEl = document.getElementById('rev-roulette');

            if (data.roulettes.length > 0) {
                showScreen('step-reveal');
                for (const r of data.roulettes) {
                    imgEl.style.display = 'none'; pickEl.style.display = 'none'; rouletteEl.style.display = 'none';
                    sndConflict(); // ピピッ！
                    title.innerText = "【指名重複（競合）】";
                    nameEl.innerText = r.players.map(p => p.name).join(' / ');
                    nameEl.classList.add('reveal-conflict');
                    pickEl.innerText = `指名: ${r.pick}`; pickEl.style.display = 'block';
                    
                    await sleep(3000);

                    title.innerText = "抽選（ルーレット）を行います...";
                    nameEl.innerText = ""; pickEl.style.display = 'none';
                    rouletteEl.style.display = 'block';

                    let delay = 50; let currentIdx = 0; const pList = r.players;
                    for(let i=0; i<30; i++) { rouletteEl.innerText = pList[currentIdx].name; sndTick(); await sleep(delay); delay += i * 1.5; currentIdx = (currentIdx + 1) % pList.length; }
                    
                    sndWin();
                    rouletteEl.innerHTML = `<span style="color:var(--success)">交渉権獲得：${r.winnerName} 監督!!</span>`;
                    await sleep(4000);
                }
            }
            renderFinalResults(data.results, data.allDone);
        });

        // --- 結果一覧 ---
        function renderFinalResults(results, allDone) {
            showScreen('step-result');
            const l = document.getElementById('result-list'); l.innerHTML = '';
            
            results.forEach(r => {
                const li = document.createElement('li'); li.className = 'result-item ' + (r.status==='success' ? 'result-success' : 'result-lost');
                li.innerHTML = `<strong>${r.playerName}</strong>: <span style="font-size:1.2em; font-weight:bold;">${r.pick}</span> ${r.isDuplicate ? '<span style="color:#fbbf24; margin-left:10px;">[競合]</span>' : ''}`;
                l.appendChild(li);
            });

            if (isHost) {
                document.getElementById('btn-re-nominate').style.display = allDone ? 'none' : 'block';
                document.getElementById('btn-next-round').style.display = (allDone && currentRound < maxRounds) ? 'block' : 'none';
                document.getElementById('btn-show-final').style.display = (allDone && currentRound >= maxRounds) ? 'block' : 'none';
            }
        }

        document.getElementById('btn-next-round').onclick = () => { currentRound++; document.getElementById('round-num-text').innerText = currentRound; socket.emit('startRound', myRoomId, currentRound, 60, false); };
        
        // --- 最終結果 ---
        document.getElementById('btn-show-final').onclick = () => { socket.emit('requestFinalResults', myRoomId); };
        socket.on('finalSummary', log => {
            showScreen('step-final'); const namesDiv = document.getElementById('final-names'); namesDiv.innerHTML = '';
            for (let name in log) { const n = document.createElement('div'); n.innerText = name; n.onclick = () => { const det = document.getElementById('final-details'); det.innerHTML = `<h3 style="color:var(--primary);">${name} 監督の指名一覧</h3>`; log[name].forEach((p, i) => { det.innerHTML += `<div class="history-item"><strong style="color:#94a3b8;">${i+1}巡目:</strong> <span style="font-size:1.2em;">${p}</span></div>`; }); }; namesDiv.appendChild(n); }
        });
    </script>
</body>
</html>
