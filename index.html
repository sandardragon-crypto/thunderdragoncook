<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>我らのドラフト会議 - 無料オンラインドラフトシミュレーター</title>
    <meta name="description" content="友達や仲間とスマホで手軽にドラフト会議を楽しめる無料のオンラインシミュレーターアプリ。インストール不要、合言葉を入れるだけでホワイトボード形式の指名や競合ルーレットが楽しめます。">
    
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --primary: #3b82f6; --primary-hover: #2563eb; --accent: #f43f5e; --success: #10b981; --gray: #64748b; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        h1 { color: #fff; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); font-size: 2.5em; margin-bottom: 10px;}
        .screen { display: none; background: var(--panel); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 700px; margin: 0 auto; border: 1px solid #334155; position: relative; flex: 1; width: 100%; box-sizing: border-box; }
        .active-screen { display: block; }
        input[type="text"], select { padding: 12px; font-size: 1.2em; width: 80%; margin: 10px 0; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: white; }
        button { padding: 15px 30px; font-size: 1.1em; margin: 10px; cursor: pointer; border: none; border-radius: 6px; background-color: var(--primary); color: white; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background-color: #475569; cursor: not-allowed; color: #94a3b8; transform: none; box-shadow: none; }
        
        #timerDisplay { font-size: 5em; color: var(--accent); font-weight: bold; text-shadow: 0 0 15px rgba(244, 63, 94, 0.5); }
        #whiteboard { border: 3px solid #cbd5e1; background-color: white; border-radius: 8px; cursor: crosshair; touch-action: none; margin: 15px auto; display: block; max-width: 100%; }
        
        .status-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; background-color: var(--gray); display: inline-block; margin-right: 5px; vertical-align: middle; }
        .status-dot.done { background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-item { background: #0f172a; padding: 8px 15px; border-radius: 20px; font-size: 0.9em; border: 1px solid #334155;}

        .judge-item { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155;}
        .judge-item img { background: white; border-radius: 4px; max-width: 150px; border: 1px solid #ccc; }
        .judge-item input { width: 50%; margin-left: 10px; border: 2px solid var(--gray); }
        .judge-item input.error { border-color: var(--accent); background-color: rgba(244, 63, 94, 0.1); }

        #reveal-container { min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .reveal-title { font-size: 1.5em; color: var(--gray); margin-bottom: 20px; }
        .reveal-name { font-size: 3em; color: #fff; font-weight: bold; text-shadow: 0 0 15px var(--primary); margin-bottom: 20px; }
        .reveal-conflict { font-size: 3em; color: var(--accent); font-weight: bold; text-shadow: 0 0 20px var(--accent); animation: flash 0.5s infinite alternate; }
        .reveal-image { background: white; padding: 10px; border-radius: 8px; max-width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; margin-bottom: 10px;}
        .reveal-pick-text { font-size: 2.5em; color: var(--success); font-weight: bold; display: none; }
        .roulette-box { background: #0f172a; border: 2px solid var(--primary); padding: 20px; border-radius: 12px; font-size: 2em; margin: 20px 0; width: 80%; display: none; }
        
        @keyframes flash { from { opacity: 0.5; } to { opacity: 1; } }

        .result-item { margin: 10px 0; padding: 15px; border-radius: 8px; border-left: 5px solid #475569; text-align: left; background: #0f172a; }
        .result-success { border-left-color: var(--success); }
        .result-lost { border-left-color: var(--accent); opacity: 0.8; }
        .host-only { display: none; background-color: rgba(245, 158, 11, 0.1); padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid rgba(245, 158, 11, 0.3); }
